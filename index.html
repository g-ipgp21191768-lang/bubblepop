<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permainan Buih Sabun Pintar</title>
    
    <!-- Tailwind CSS for UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts for Chalkboard and UI -->
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Baloo+2:wght@600&display=swap" rel="stylesheet">
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Baloo 2', cursive;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none; /* Let clicks pass through to canvas if using mouse */
        }

        /* Chalkboard Style */
        .chalkboard {
            background-color: #2c5e43;
            border: 12px solid #5c4033;
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 5px 5px 15px rgba(0,0,0,0.5);
            color: #f4f4f4;
            font-family: 'Patrick Hand', cursive;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background-image: 
                radial-gradient(circle, rgba(255,255,255,0.05) 10%, transparent 10%),
                radial-gradient(circle, rgba(255,255,255,0.05) 10%, transparent 10%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        /* Red Flash & Shake Effect */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-15px) rotate(-1deg); }
            40% { transform: translateX(15px) rotate(1deg); }
            60% { transform: translateX(-15px) rotate(-1deg); }
            80% { transform: translateX(15px) rotate(1deg); }
        }

        .shake-active {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        #red-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 0, 0, 0.4);
            z-index: 15;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .flash-active {
            opacity: 1 !important;
        }

        /* Overlay Styles */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .btn {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Baloo 2', cursive;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 25px rgba(255, 107, 107, 0.6);
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Red flash overlay for wrong answers -->
    <div id="red-flash"></div>

    <!-- Hidden Video Element for MediaPipe -->
    <video id="webcam" autoplay playsinline style="display: none;"></video>

    <!-- Main Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Layer -->
    <div class="ui-layer flex flex-col justify-between p-4">
        <!-- Top Section: Scoreboards and Chalkboard -->
        <div class="flex justify-between items-start gap-4">
            
            <!-- Left Scoreboard -->
            <div class="bg-blue-500 bg-opacity-90 border-4 border-white text-white rounded-xl px-6 py-3 shadow-lg transform rotate-[-2deg]">
                <h2 class="text-xl leading-none opacity-80">Markah</h2>
                <p id="scoreDisplay" class="text-4xl font-bold leading-none mt-1">0</p>
            </div>

            <!-- Center Chalkboard Question -->
            <div id="chalkboard-container" class="chalkboard flex-grow max-w-3xl px-8 py-6 text-center transform hidden">
                <p id="questionText" class="text-3xl md:text-4xl leading-relaxed tracking-wide"></p>
                <!-- Large Red X marker hidden by default -->
                <div id="crossMark" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-9xl text-red-500 font-bold opacity-0 transition-opacity duration-300 pointer-events-none">
                    ✘
                </div>
            </div>

            <!-- Right Scoreboard -->
            <div class="bg-purple-500 bg-opacity-90 border-4 border-white text-white rounded-xl px-6 py-3 shadow-lg transform rotate-[2deg]">
                <h2 class="text-xl leading-none opacity-80">Soalan</h2>
                <p id="progressDisplay" class="text-3xl font-bold leading-none mt-1">1/7</p>
            </div>

        </div>
    </div>

    <!-- Start Screen Overlay -->
    <div id="startScreen" class="overlay">
        <h1 class="text-6xl text-white mb-6 text-center font-bold text-shadow-lg">Permainan Buih Pintar</h1>
        <p class="text-xl text-gray-300 mb-8 max-w-2xl text-center">
            Gunakan jari telunjuk anda di hadapan kamera untuk memecahkan buih jawapan yang betul!<br>
            <i>(Use your index finger in front of the camera to pop the correct bubble)</i>
        </p>
        <button id="startBtn" class="btn">Mula Main!</button>
        <p id="loadingText" class="text-yellow-400 mt-6 hidden text-lg animate-pulse">Memuatkan model AI kamera...</p>
    </div>

    <!-- Game Over Overlay -->
    <div id="endScreen" class="overlay hidden">
        <h1 class="text-6xl text-white mb-6 text-center font-bold">Tahniah!</h1>
        <p class="text-3xl text-gray-200 mb-8 text-center">Markah Akhir: <span id="finalScore" class="text-yellow-400 font-bold"></span></p>
        <button id="restartBtn" class="btn">Main Semula</button>
    </div>
</div>

<script>
    /* =================================================================
       DATA MANAGEMENT: Question Bank
       ================================================================= */
    const questionBank = [
        { text: "1. Frasa Adjektif digunakan selepas kata pemeri 'adalah'.", answer: "Betul" },
        { text: "2. Frasa Sendi Nama terdapat kata sendi seperti (di, daripada, untuk).", answer: "Betul" },
        { text: "3. 'Ialah' digunakan sebelum Frasa Sendi Nama.", answer: "Salah" },
        { text: "4. IN dalam ASAd-IN merujuk kepada Ialah dan Frasa Nama.", answer: "Betul" },
        { text: "5. “Ali ialah seorang murid yang cemerlang”", answer: "Betul" },
        { text: "6. Membaca adalah bagus untuk menambah ilmu.", answer: "Betul" },
        { text: "7. ASAd dalam ASAd-IN merujuk kepada Frasa Sendi Nama dan Adjektif.", answer: "Betul" }
    ];

    /* =================================================================
       GAME VARIABLES & STATE
       ================================================================= */
    let currentQuestionIndex = 0;
    let score = 0;
    let gameState = "START"; // START, LOADING, PLAYING, TRANSITION, END
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('webcam');
    
    // UI Elements
    const startScreen = document.getElementById('startScreen');
    const endScreen = document.getElementById('endScreen');
    const chalkboard = document.getElementById('chalkboard-container');
    const questionText = document.getElementById('questionText');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const progressDisplay = document.getElementById('progressDisplay');
    const gameContainer = document.getElementById('game-container');
    const redFlash = document.getElementById('red-flash');
    const crossMark = document.getElementById('crossMark');
    
    let bubbles = [];
    let particles = [];
    
    // Pointer derived from MediaPipe (or mouse fallback)
    let pointer = { x: -100, y: -100, isDetected: false };
    let isCameraActive = false; // Track if camera is successfully running

    /* =================================================================
       AUDIO SYSTEM (Web Audio API)
       ================================================================= */
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'pop') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'correct') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.setValueAtTime(554, now + 0.1); 
            osc.frequency.setValueAtTime(659, now + 0.2); 
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        }
    }

    /* =================================================================
       CLASSES: Bubble & Particle
       ================================================================= */
    const bubbleColors = [
        "rgba(255, 99, 132, 0.7)",  // Red/Pink
        "rgba(54, 162, 235, 0.7)",  // Blue
        "rgba(255, 206, 86, 0.7)",  // Yellow
        "rgba(75, 192, 192, 0.7)",  // Teal
        "rgba(153, 102, 255, 0.7)", // Purple
        "rgba(255, 159, 64, 0.7)"   // Orange
    ];

    class Bubble {
        constructor(text, isCorrect) {
            this.text = text;
            this.isCorrect = isCorrect;
            this.radius = Math.random() * 20 + 70; // 70 to 90 radius
            
            // Start lower half of screen to avoid chalkboard initially
            this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
            this.y = canvas.height + this.radius + (Math.random() * 200); 
            
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = -(Math.random() * 2 + 2); // Float upwards initially
            
            this.color = bubbleColors[Math.floor(Math.random() * bubbleColors.length)];
            this.popped = false;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            // Wobble effect
            this.vx += (Math.random() - 0.5) * 0.5;
            
            // Limit horizontal speed
            if (this.vx > 3) this.vx = 3;
            if (this.vx < -3) this.vx = -3;

            // Bounce off walls
            if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -1; }
            if (this.x + this.radius > canvas.width) { this.x = canvas.width - this.radius; this.vx *= -1; }
            
            // Bounce off bottom
            if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy *= -1; }
            
            // Bounce off top area (beneath chalkboard approx Y=200)
            if (this.y - this.radius < 180) { 
                this.y = 180 + this.radius; 
                this.vy *= -1; 
            }
        }

        draw(ctx) {
            if (this.popped) return;
            
            ctx.save();
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            
            // Radial gradient for 3D bubble effect
            let grad = ctx.createRadialGradient(
                this.x - this.radius*0.3, this.y - this.radius*0.3, this.radius*0.1, 
                this.x, this.y, this.radius
            );
            grad.addColorStop(0, "rgba(255, 255, 255, 0.9)");
            grad.addColorStop(0.3, this.color);
            grad.addColorStop(1, "rgba(255, 255, 255, 0.2)");
            
            ctx.fillStyle = grad;
            ctx.fill();
            
            ctx.lineWidth = 2;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.6)";
            ctx.stroke();

            // Bubble Reflection Crescent
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius * 0.75, Math.PI * 1.1, Math.PI * 1.6);
            ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            ctx.stroke();

            // Text
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 32px 'Baloo 2', cursive";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.shadowColor = "rgba(0,0,0,0.6)";
            ctx.shadowBlur = 6;
            ctx.fillText(this.text, this.x, this.y);
            ctx.restore();
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * 8 + 2;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.life = 1.0;
            this.color = color;
            this.size = Math.random() * 6 + 4;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.02; // Fade out speed
        }

        draw(ctx) {
            if (this.life <= 0) return;
            ctx.save();
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
    }

    /* =================================================================
       GAME LOGIC
       ================================================================= */
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function loadQuestion() {
        if (currentQuestionIndex >= questionBank.length) {
            endGame();
            return;
        }
        
        gameState = "PLAYING";
        const q = questionBank[currentQuestionIndex];
        questionText.innerHTML = q.text;
        chalkboard.classList.remove('hidden');
        progressDisplay.innerText = `${currentQuestionIndex + 1}/${questionBank.length}`;
        
        bubbles = [];
        particles = [];
        crossMark.style.opacity = '0';
        
        // Spawn bubbles (3 Correct, 3 Wrong to fill the screen)
        for(let i=0; i<3; i++) {
            bubbles.push(new Bubble("Betul", q.answer === "Betul"));
            bubbles.push(new Bubble("Salah", q.answer === "Salah"));
        }
    }

    function createExplosion(x, y, color) {
        playSound('pop');
        for (let i = 0; i < 20; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    function triggerWrongEffect() {
        playSound('wrong');
        score = Math.max(0, score - 5); // Penalty
        scoreDisplay.innerText = score;
        
        // Visual shake & red flash
        gameContainer.classList.add('shake-active');
        redFlash.classList.add('flash-active');
        crossMark.style.opacity = '0.8';
        
        setTimeout(() => {
            gameContainer.classList.remove('shake-active');
            redFlash.classList.remove('flash-active');
            crossMark.style.opacity = '0';
        }, 400);
    }

    function triggerCorrectEffect() {
        gameState = "TRANSITION"; // Prevent other pops
        playSound('correct');
        score += 10;
        scoreDisplay.innerText = score;
        
        // Pop all remaining bubbles as celebratory effect
        bubbles.forEach(b => {
            if(!b.popped) createExplosion(b.x, b.y, b.color);
        });
        bubbles = [];
        
        setTimeout(() => {
            currentQuestionIndex++;
            loadQuestion();
        }, 1500);
    }

    function checkCollisions() {
        if (gameState !== "PLAYING" || !pointer.isDetected) return;

        for (let i = 0; i < bubbles.length; i++) {
            let b = bubbles[i];
            if (b.popped) continue;

            let dist = Math.hypot(pointer.x - b.x, pointer.y - b.y);
            if (dist < b.radius) {
                b.popped = true;
                createExplosion(b.x, b.y, b.color);

                if (b.isCorrect) {
                    triggerCorrectEffect();
                } else {
                    triggerWrongEffect();
                }
                // Only process one collision per frame to prevent multi-pops
                break; 
            }
        }
    }

    /* =================================================================
       MAIN RENDER LOOP
       ================================================================= */
    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Draw Video Mirrored
        if (isCameraActive && video.readyState >= 2) {
            ctx.save();
            ctx.scale(-1, 1);
            // Draw mirrored to map physical left to visual left
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();
        }

        // Apply dark overlay to make elements pop
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(0,0,canvas.width, canvas.height);

        // 2. Update & Draw Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.update();
            p.draw(ctx);
            if (p.life <= 0) particles.splice(i, 1);
        }

        // 3. Update & Draw Bubbles
        if (gameState === "PLAYING") {
            bubbles.forEach(b => {
                b.update();
                b.draw(ctx);
            });
            checkCollisions();
        }

        // 4. Draw Pointer (Glowing Dot)
        if (pointer.isDetected && (gameState === "PLAYING" || gameState === "TRANSITION")) {
            ctx.beginPath();
            ctx.arc(pointer.x, pointer.y, 15, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 255, 0, 0.8)";
            ctx.shadowColor = "yellow";
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0; // reset
        }

        requestAnimationFrame(gameLoop);
    }

    /* =================================================================
       MEDIAPIPE HAND TRACKING SETUP
       ================================================================= */
    const hands = new Hands({
        locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults((results) => {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            pointer.isDetected = true;
            // Index finger tip is landmark 8
            const landmark = results.multiHandLandmarks[0][8];
            
            // Map normalized coordinates [0,1] to Canvas.
            // Because video is drawn mirrored visually, physical left hand (which has low X in raw camera)
            // needs to be mapped to the right side of the screen.
            pointer.x = canvas.width * (1 - landmark.x);
            pointer.y = canvas.height * landmark.y;
        } else {
            pointer.isDetected = false;
        }
    });

    async function processVideoFrames() {
        if (!video.paused && !video.ended) {
            await hands.send({image: video});
        }
        requestAnimationFrame(processVideoFrames);
    }

    /* =================================================================
       GAME FLOW CONTROL
       ================================================================= */
    async function startGame() {
        document.getElementById('loadingText').classList.remove('hidden');
        document.getElementById('startBtn').style.display = 'none';
        
        initAudio();

        try {
            // Request Webcam
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user', width: 1280, height: 720 } 
            });
            video.srcObject = stream;
            isCameraActive = true;
            
            video.onloadedmetadata = async () => {
                await video.play();
                // Send first frame to initialize models (forces loading delay here)
                await hands.send({image: video}); 
                
                // Start processing loop and graphics loop
                processVideoFrames();
                requestAnimationFrame(gameLoop);

                // Setup Game Environment
                startScreen.classList.add('hidden');
                currentQuestionIndex = 0;
                score = 0;
                scoreDisplay.innerText = score;
                loadQuestion();
            };
        } catch (err) {
            console.warn("Kamera tidak dapat diakses. Menggunakan mod tetikus/sentuhan.", err);
            isCameraActive = false;
            
            // Start game WITHOUT camera loop
            requestAnimationFrame(gameLoop);
            
            startScreen.classList.add('hidden');
            currentQuestionIndex = 0;
            score = 0;
            scoreDisplay.innerText = score;
            loadQuestion();
        }
    }

    function endGame() {
        gameState = "END";
        chalkboard.classList.add('hidden');
        endScreen.classList.remove('hidden');
        document.getElementById('finalScore').innerText = score;
    }

    // Mouse and Touch Fallback
    function updatePointer(x, y) {
        if(!isCameraActive && gameState !== "START") { 
            pointer.x = x;
            pointer.y = y;
            pointer.isDetected = true; 
            clearTimeout(window.mouseTimeout);
            window.mouseTimeout = setTimeout(()=> pointer.isDetected = false, 150);
        }
    }

    window.addEventListener('mousemove', (e) => {
        updatePointer(e.clientX, e.clientY);
    });

    window.addEventListener('touchmove', (e) => {
        if(e.touches.length > 0) {
            updatePointer(e.touches[0].clientX, e.touches[0].clientY);
        }
    }, {passive: true});

    window.addEventListener('touchstart', (e) => {
        if(e.touches.length > 0) {
            updatePointer(e.touches[0].clientX, e.touches[0].clientY);
        }
    }, {passive: true});

    // Event Listeners
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', () => {
        endScreen.classList.add('hidden');
        currentQuestionIndex = 0;
        score = 0;
        scoreDisplay.innerText = score;
        loadQuestion();
    });

</script>
</body>
</html>
